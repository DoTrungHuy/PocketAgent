<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AgentPad Agent Preview</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="shell">
      <aside class="sidebar">
        <div class="brand">
          <span>AP</span>
          <div>
            <strong>AgentPad</strong>
            <small>phone agent</small>
          </div>
        </div>

        <button class="new-chat">+ New chat</button>

        <nav class="nav">
          <button class="active" data-view="chat">Chat</button>
          <button data-view="settings">Settings</button>
        </nav>

        <p class="label">Recent</p>
        <button class="thread active">
          <strong>新对话</strong>
          <small>agent session</small>
        </button>
        <button class="thread">
          <strong>图片分析</strong>
          <small>已授权 2 项内容</small>
        </button>
      </aside>

      <section class="main">
        <header class="topbar">
          <div>
            <small>Current chat</small>
            <h1 id="title">New chat</h1>
          </div>
          <span class="model">DeepSeek · deepseek-v4-flash</span>
        </header>

        <section class="view active" id="chat-view">
          <div class="messages" id="messages">
            <article class="empty-state">
              <span>AP</span>
              <h2>AgentPad</h2>
              <small>Mobile agent for authorized phone content.</small>
            </article>
          </div>

          <form class="composer" id="composer">
            <button type="button" class="attach" id="authorize">Read</button>
            <input id="prompt" placeholder="Message AgentPad..." />
            <button class="primary">Send</button>
          </form>
        </section>

        <section class="view" id="settings-view">
          <div class="page">
            <div class="heading">
              <small>Settings</small>
              <h2>Model</h2>
            </div>
            <article class="panel">
              <h3>Provider</h3>
              <div class="providers">
                <button class="selected">DeepSeek</button>
                <button>通义百炼</button>
                <button>Kimi</button>
                <button>智谱 GLM</button>
                <button>Custom</button>
              </div>
            </article>
            <article class="panel">
              <h3>App</h3>
              <label><input type="checkbox" checked /> Agent reads chat content</label>
              <label><input type="checkbox" checked /> Agent reads images</label>
              <label><input type="checkbox" checked /> Dark theme</label>
              <label><input type="checkbox" /> Privacy mode</label>
            </article>
          </div>
        </section>
      </section>
    </main>

    <nav class="bottom-nav">
      <button class="active" data-view="chat">Chat</button>
      <button data-view="settings">Settings</button>
    </nav>

    <script src="./app.js"></script>
  </body>
</html>
