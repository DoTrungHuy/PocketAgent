name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle
          cache-dependency-path: android-app/**/*.gradle*

      - name: Set up Android command-line tools
        uses: android-actions/setup-android@v3

      - name: Set up Android SDK 36
        run: |
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager "platforms;android-36" "build-tools;35.0.0"

      - name: Verify release tag
        shell: bash
        run: |
          version="$(sed -n 's/.*versionName = "\(.*\)"/\1/p' android-app/app/build.gradle.kts)"
          test "v${version}" = "${GITHUB_REF_NAME}" || {
            echo "Tag ${GITHUB_REF_NAME} does not match app version v${version}."
            exit 1
          }

      - name: Scan tracked files for secrets
        shell: pwsh
        run: ./scripts/check-secrets.ps1

      - name: Restore release keystore
        shell: bash
        env:
          RELEASE_KEYSTORE_BASE64: ${{ secrets.AGENTPAD_RELEASE_KEYSTORE }}
        run: |
          test -n "${RELEASE_KEYSTORE_BASE64}"
          printf '%s' "${RELEASE_KEYSTORE_BASE64}" | base64 --decode > "${RUNNER_TEMP}/agentpad-release.jks"

      - name: Test, lint, sign, and generate SBOM
        working-directory: android-app
        env:
          AGENTPAD_KEYSTORE_PATH: ${{ runner.temp }}/agentpad-release.jks
          AGENTPAD_KEYSTORE_PASSWORD: ${{ secrets.AGENTPAD_KEYSTORE_PASSWORD }}
          AGENTPAD_KEY_ALIAS: ${{ secrets.AGENTPAD_KEY_ALIAS }}
          AGENTPAD_KEY_PASSWORD: ${{ secrets.AGENTPAD_KEY_PASSWORD }}
        run: |
          chmod +x gradlew
          ./gradlew --no-daemon testDebugUnitTest lintRelease assembleRelease cyclonedxBom

      - name: Verify and stage release assets
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          name="AgentPad-${GITHUB_REF_NAME}.apk"
          mkdir -p release
          cp android-app/app/build/outputs/apk/release/app-release.apk "release/${name}"
          apksigner verify --verbose --print-certs "release/${name}" | tee release/SIGNING_CERTIFICATE.txt
          sha256sum "release/${name}" | tee "release/${name}.sha256"
          cp android-app/build/reports/cyclonedx/bom.json "release/AgentPad-${GITHUB_REF_NAME}-sbom.cdx.json"
          cp LICENSE THIRD_PARTY_NOTICES.md release/
          jq -n \
            --arg version "${version}" \
            --arg tag "${GITHUB_REF_NAME}" \
            --arg apk "${name}" \
            --arg sha256 "$(sha256sum "release/${name}" | cut -d' ' -f1)" \
            '{
              schemaVersion: 1,
              packageName: "com.agentpad.app",
              version: $version,
              tag: $tag,
              minSdk: 28,
              targetSdk: 36,
              apk: $apk,
              sha256: $sha256
            }' > release/update-manifest.json

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" release/* \
            --title "AgentPad ${GITHUB_REF_NAME}" \
            --notes-file "docs/releases/${GITHUB_REF_NAME}.md" \
            --prerelease \
            --verify-tag

      - name: Remove temporary release key
        if: always()
        run: rm -f "${RUNNER_TEMP}/agentpad-release.jks"
