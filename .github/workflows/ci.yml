name: CI

on:
  push:
    branches: ["main"]
  pull_request:

permissions:
  contents: read

jobs:
  android:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle
          cache-dependency-path: android-app/**/*.gradle*

      - name: Set up Android SDK 36
        run: |
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager "platforms;android-36" "build-tools;35.0.0"

      - name: Scan tracked files for secrets
        shell: pwsh
        run: ./scripts/check-secrets.ps1

      - name: Test, lint, and build
        working-directory: android-app
        run: |
          chmod +x gradlew
          ./gradlew --no-daemon testDebugUnitTest lintDebug assembleDebug

      - name: Upload verification reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: agentpad-ci-reports
          if-no-files-found: ignore
          path: |
            android-app/app/build/reports/tests/
            android-app/app/build/reports/lint-results-debug.*

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: agentpad-debug-apk
          path: android-app/app/build/outputs/apk/debug/app-debug.apk
