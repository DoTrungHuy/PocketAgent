name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  android:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Check out source
        uses: actions/checkout@v6

      - name: Set up Java 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle
          cache-dependency-path: android-app/**/*.gradle*

      - name: Set up Android command-line tools
        uses: android-actions/setup-android@v4

      - name: Set up Android SDK 36
        run: |
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager "platforms;android-36" "build-tools;35.0.0"

      - name: Scan tracked files for secrets
        shell: pwsh
        run: ./scripts/check-secrets.ps1

      - name: Test, lint, and build
        id: build
        working-directory: android-app
        run: |
          chmod +x gradlew
          ./gradlew --no-daemon testDebugUnitTest lintDebug assembleDebug assembleDebugAndroidTest
          short_sha="${GITHUB_SHA:0:12}"
          cp app/build/outputs/apk/debug/app-debug.apk \
            "app/build/outputs/apk/debug/AgentPad-debug-${short_sha}.apk"
          echo "short_sha=${short_sha}" >> "${GITHUB_OUTPUT}"

      - name: Upload verification reports
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: agentpad-ci-reports
          if-no-files-found: ignore
          path: |
            android-app/app/build/reports/tests/
            android-app/app/build/reports/lint-results-debug.*

      - name: Upload debug APK
        uses: actions/upload-artifact@v6
        with:
          name: AgentPad-debug-${{ steps.build.outputs.short_sha }}
          path: android-app/app/build/outputs/apk/debug/AgentPad-debug-${{ steps.build.outputs.short_sha }}.apk

  instrumentation:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Check out source
        uses: actions/checkout@v6

      - name: Set up Java 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle
          cache-dependency-path: android-app/**/*.gradle*

      - name: Set up Android command-line tools
        uses: android-actions/setup-android@v4

      - name: Set up Android SDK 36
        run: |
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager "platforms;android-36" "build-tools;35.0.0"

      - name: Run migration and Compose tests
        uses: ReactiveCircus/android-emulator-runner@v2
        with:
          api-level: 35
          arch: x86_64
          profile: pixel_6
          disable-animations: true
          script: |
            cd android-app
            chmod +x gradlew
            ./gradlew --no-daemon connectedDebugAndroidTest
